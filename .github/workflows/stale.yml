name: Stale Issues and PRs

on:
  schedule:
    # Run daily at 01:00 UTC
    - cron: '0 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          # Issues
          days-before-issue-stale: 90
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs. Feel free to reopen if this is still relevant.
          close-issue-message: 'Closing stale issue due to inactivity.'

          # Pull Requests
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs. Feel free to reopen if you plan to continue.
          close-pr-message: 'Closing stale PR due to inactivity.'

          # Exempt labels
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security,blocked'

          # Operations
          remove-stale-when-updated: true
