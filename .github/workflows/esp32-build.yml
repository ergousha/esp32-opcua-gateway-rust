name: ESP32 Build

# This is a single `std`, ESP-IDF-based crate (esp-idf-svc,
# xtensa-esp32s3-espidf) — unlike a split workspace with a host-testable
# crate, every job here needs the espup-installed `esp` toolchain, since even
# `cargo check`/`clippy`/`doc` must compile target-specific HAL code and link
# against ESP-IDF (via `ldproxy`, embuild downloads/builds the SDK itself).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build for ESP32-S3
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for AWS OIDC authentication
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      # RUSTUP_TOOLCHAIN=stable is required here: the repo's rust-toolchain.toml
      # pins the espup-installed `esp` toolchain repo-wide, but it isn't
      # installed yet at this point, so any plain `cargo` invocation would
      # otherwise fail with "custom toolchain 'esp' ... is not installed".
      - name: Install espup
        run: cargo install espup --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: Install ESP toolchain
        run: espup install --targets esp32s3
        env:
          # espup queries the GitHub API for release info; unauthenticated
          # requests are rate-limited (60/hr per IP) and can 403 on shared
          # CI runners. Authenticating raises that to 5000/hr.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-espflash
        run: cargo install cargo-espflash --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: Build for ESP32-S3
        run: |
          source $HOME/export-esp.sh
          cargo build --release --verbose

      - name: Generate Firmware Bin
        run: |
          source $HOME/export-esp.sh
          cargo espflash save-image --release --chip esp32s3 firmware.bin

      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/esp32-ztp-github-actions-role
          aws-region: eu-central-1

      - name: Upload Firmware to S3
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION=$(grep -m1 '^version =' Cargo.toml | cut -d '"' -f2)
          aws s3 cp firmware.bin s3://esp32-ztp-firmware-${{ secrets.AWS_ACCOUNT_ID }}/firmware_v${VERSION}_${{ github.sha }}.bin

  check:
    name: Cargo check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install espup
        run: cargo install espup --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      # .cargo/config.toml sets `linker = "ldproxy"` for the espidf target;
      # ldproxy is a separate esp-rs crate that espup does not install.
      - name: Install ldproxy
        run: cargo install ldproxy --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: Install ESP toolchain
        run: espup install --targets esp32s3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run cargo check
        run: |
          source $HOME/export-esp.sh
          cargo check --verbose

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # cargo fmt doesn't invoke rustc, so it never needs the espup-installed
    # `esp` toolchain — force stable to avoid "custom toolchain 'esp' ... is
    # not installed" from the repo's rust-toolchain.toml.
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy

      - name: Install espup
        run: cargo install espup --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      # .cargo/config.toml sets `linker = "ldproxy"` for the espidf target;
      # ldproxy is a separate esp-rs crate that espup does not install.
      - name: Install ldproxy
        run: cargo install ldproxy --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: Install ESP toolchain
        run: espup install --targets esp32s3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run clippy
        run: |
          source $HOME/export-esp.sh
          cargo clippy --all-targets --all-features -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install espup
        run: cargo install espup --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      # .cargo/config.toml sets `linker = "ldproxy"` for the espidf target;
      # ldproxy is a separate esp-rs crate that espup does not install.
      - name: Install ldproxy
        run: cargo install ldproxy --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: Install ESP toolchain
        run: espup install --targets esp32s3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check documentation
        run: |
          source $HOME/export-esp.sh
          cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  esp32-size:
    name: Check Binary Size
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install espup and cargo-bloat
        run: |
          cargo install espup --locked
          cargo install cargo-bloat --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      # .cargo/config.toml sets `linker = "ldproxy"` for the espidf target;
      # ldproxy is a separate esp-rs crate that espup does not install.
      - name: Install ldproxy
        run: cargo install ldproxy --locked
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: Install ESP toolchain
        run: espup install --targets esp32s3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build for size check
        run: |
          source $HOME/export-esp.sh
          cargo build --release

      # cargo-bloat's ELF parser doesn't reliably support the Xtensa
      # architecture used by the esp32s3 target (known upstream limitation),
      # so this can fail with "symbols section is missing" even though the
      # build above succeeded. Non-fatal: it's a size-reporting nicety, not
      # a correctness check.
      - name: Check binary size
        continue-on-error: true
        run: |
          source $HOME/export-esp.sh
          cargo bloat --release -n 20
