name: ESP32 Release

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - '.cargo/**'
      - 'rust-toolchain.toml'
      - 'sdkconfig.defaults'
      - 'partitions.csv'
      - 'certs/AmazonRootCA1.pem'
      - '.github/workflows/release.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_BUILD_JOBS: "2"
  CMAKE_BUILD_PARALLEL_LEVEL: "2"
  ESPFLASH_VERSION: "4.5.0"
  ESPFLASH_SHA256: "9408208ee3d2408cd1247da61bf6e85e7611d4380c590b85e61070fe7e2bb069"
  ACT: false

jobs:
  release:
    name: Build & Release for ESP32-S3
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create GitHub Releases and commit version bumps
      id-token: write # Required for AWS OIDC authentication
      pull-requests: write # Required for release-please to create PRs
    steps:
      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f # v4.1.3
        id: release
        with:
          release-type: rust

      - name: Verify release configuration
        if: ${{ steps.release.outputs.release_created }}
        env:
          AWS_FIRMWARE_BUCKET: ${{ vars.AWS_FIRMWARE_BUCKET }}
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          if [[ -z "$AWS_ROLE_ARN" || -z "$AWS_FIRMWARE_BUCKET" ]]; then
            echo "::error::Set the AWS_ROLE_ARN and AWS_FIRMWARE_BUCKET repository variables."
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ steps.release.outputs.release_created }}
        with:
          persist-credentials: false

      - name: Install ESP toolchain
        if: ${{ steps.release.outputs.release_created }}
        uses: esp-rs/xtensa-toolchain@ec6d36527049a7f4fb2cb0c1a644668c1bb8a2a4 # v1.7.0
        with:
          buildtargets: esp32s3
          ldproxy: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up swap space
        if: ${{ steps.release.outputs.release_created }}
        uses: pierotofy/set-swap-space@fc79b3f67fa8a838184ce84a674ca12238d2c761 # master
        with:
          swap-size-gb: 10

      - name: Cache Rust build
        # zizmor: ignore[cache-poisoning]
        if: ${{ steps.release.outputs.release_created && !env.ACT }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-espflash
        if: ${{ steps.release.outputs.release_created }}
        run: |
          archive="$RUNNER_TEMP/cargo-espflash.zip"
          curl --fail --location --retry 3 --output "$archive" \
            "https://github.com/esp-rs/espflash/releases/download/v${ESPFLASH_VERSION}/cargo-espflash-x86_64-unknown-linux-gnu.zip"
          echo "${ESPFLASH_SHA256}  ${archive}" | sha256sum --check
          unzip -q "$archive" -d "$HOME/.cargo/bin"
          chmod +x "$HOME/.cargo/bin/cargo-espflash"

      - name: Build for ESP32-S3
        if: ${{ steps.release.outputs.release_created }}
        run: cargo build --release

      - name: Generate Firmware Bin
        if: ${{ steps.release.outputs.release_created }}
        run: >-
          cargo espflash save-image --release --chip esp32s3 --flash-size 16mb
          --partition-table partitions.csv --target-app-partition ota_0 firmware.bin

      - name: Upload Firmware to GitHub Release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" firmware.bin --clobber

      - name: Configure AWS Credentials
        if: ${{ steps.release.outputs.release_created }}
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Upload Firmware to S3 (Triggers OTA)
        if: ${{ steps.release.outputs.release_created }}
        env:
          AWS_FIRMWARE_BUCKET: ${{ vars.AWS_FIRMWARE_BUCKET }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          aws s3 cp firmware.bin "s3://${AWS_FIRMWARE_BUCKET}/firmware_${TAG_NAME}.bin"
