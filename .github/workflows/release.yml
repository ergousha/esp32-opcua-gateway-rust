name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Verify Cargo.toml version matches the tag
        # Guards against the version field drifting from the tags (as
        # happened in the source project this workflow was adapted from) —
        # fails the release fast instead of letting Cargo.toml and the
        # release tags disagree indefinitely.
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          CARGO_VERSION="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $TAG_NAME does not match Cargo.toml version $CARGO_VERSION. Bump the \`version\` field in Cargo.toml to $TAG_VERSION (in a PR, before tagging) and push the tag again."
            exit 1
          fi
          echo "Cargo.toml version ($CARGO_VERSION) matches tag ($TAG_NAME)."

      - name: Build changelog
        id: changelog
        run: |
          # Extract changelog from git log since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --format="- %h %s")
          else
            CHANGELOG=$(git log $PREV_TAG..HEAD --oneline --format="- %h %s")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          TAG_NAME: ${{ github.ref_name }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "Release $TAG_NAME" \
            --notes "## Changes in this Release"$'\n'"$CHANGELOG"
