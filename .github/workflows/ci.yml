name: ESP32 Build

# This is a single `std`, ESP-IDF-based crate. Firmware checks share one runner
# so the ESP toolchain, SDK build, swap, and Cargo cache are initialized once.

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: esp32-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_BUILD_JOBS: "2"
  CMAKE_BUILD_PARALLEL_LEVEL: "2"
  ACT: false

jobs:
  firmware_ci:
    name: Firmware CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check changed paths
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          changed_files="$(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" \
            --jq '.[].filename')"

          while IFS= read -r path; do
            case "$path" in
              src/*|Cargo.toml|Cargo.lock|build.rs|.cargo/*|rust-toolchain.toml|sdkconfig.defaults|partitions.csv|certs/AmazonRootCA1.pem)
                echo "firmware=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          done <<< "$changed_files"

          echo "firmware=false" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.filter.outputs.firmware == 'true'
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        if: steps.filter.outputs.firmware == 'true'
        with:
          components: rustfmt

      - name: Run cargo fmt
        if: steps.filter.outputs.firmware == 'true'
        run: rustup run stable cargo fmt --all -- --check

      - name: Install ESP toolchain
        if: steps.filter.outputs.firmware == 'true'
        uses: esp-rs/xtensa-toolchain@ec6d36527049a7f4fb2cb0c1a644668c1bb8a2a4 # v1.7.0
        with:
          buildtargets: esp32s3
          ldproxy: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up swap space
        if: steps.filter.outputs.firmware == 'true'
        uses: pierotofy/set-swap-space@fc79b3f67fa8a838184ce84a674ca12238d2c761 # master
        with:
          swap-size-gb: 10

      - name: Cache Rust build
        if: steps.filter.outputs.firmware == 'true' && !env.ACT
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run clippy
        if: steps.filter.outputs.firmware == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check documentation
        if: steps.filter.outputs.firmware == 'true'
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Build for ESP32-S3
        if: steps.filter.outputs.firmware == 'true'
        run: cargo build --release
